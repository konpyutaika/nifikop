# This rule is not used by the project nifikop itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over nifi.konpyutaika.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nifikop
    app.kubernetes.io/managed-by: kustomize
  name: nifiregistryclient-admin-role
rules:
- apiGroups:
  - nifi.konpyutaika.com
  resources:
  - nifiregistryclients
  verbs:
  - '*'
- apiGroups:
  - nifi.konpyutaika.com
  resources:
  - nifiregistryclients/status
  verbs:
  - get
