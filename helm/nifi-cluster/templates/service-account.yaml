{{- $sccEnabled := eq (include "nifi-cluster.openshift.scc.enabled" .) "true" -}}
{{- if and $sccEnabled (not .Values.cluster.openshift.scc.serviceAccount.create) (ne .Values.cluster.manager "kubernetes") (empty .Values.cluster.openshift.scc.serviceAccount.name) }}
{{- fail "cluster.openshift.scc is active but serviceAccount.create=false and no serviceAccount.name is set. Either enable serviceAccount.create or set serviceAccount.name to a pre-existing ServiceAccount." }}
{{- end }}
{{- if or (eq .Values.cluster.manager "kubernetes") (and $sccEnabled .Values.cluster.openshift.scc.serviceAccount.create) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nifi-cluster.workloadServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.cluster.manager "kubernetes" }}
  annotations:
{{ toYaml .Values.cluster.managerServiceAccount.annotations | indent 4 }}
  labels:
{{ toYaml .Values.cluster.managerServiceAccount.labels | indent 4 }}
  {{- else }}
  annotations:
{{ toYaml .Values.cluster.openshift.scc.serviceAccount.annotations | indent 4 }}
  labels:
{{ toYaml .Values.cluster.openshift.scc.serviceAccount.labels | indent 4 }}
  {{- end }}
{{- end }}
