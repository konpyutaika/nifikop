## NiFi Operator Image
##
image:
  repository: ghcr.io/konpyutaika/docker-images/nifikop
  tag: v1.17.0-release
  pullPolicy: Always
  imagePullSecrets:
    enabled: false
#    name:
vaultAddress: ""
# vaultSecret containing a `ca.crt` key with the Vault CA Certificate
vaultSecret: ""
# set of namespaces where the operator watches resources
namespaces: []

# Optional labels to add to all deployed resources
labels: {}

# Optional annotations to add to all deployed resources
annotations: {}

## Prometheus-operator resource limits & requests
## Ref: https://kubernetes.io/docs/user-guide/compute-resources/
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 1
    memory: 512Mi

## RunAsUser for OpenShift compatibility
podSecurityContext:
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  # runAsUser: 1000
  # runAsNonRoot: true
  # seccompProfile:
  #   type: RuntimeDefault
  # capabilities:
  #   drop:
  #     - ALL

## pod spec host aliases for the operator
## Ref: https://kubernetes.io/docs/tasks/network/customize-hosts-file-for-pods/
hostAliases: []

## If true, create & deploy the CRD
##
createCustomResource: true

## If true, create & use RBAC resources
##
rbacEnable: true

## If true, create serviceAccount
##
serviceAccount:
  create: true

metrics:
  ## if true deploy service for metrics access
  enabled: false
  port: 9090

logLevel: Info
logEncoding: json

certManager:
  enabled: true
  clusterScoped: false

webhook:
  enabled: true
  tls:
    # How the operator webhook serving certificate is provided:
    #   certManager:    the chart creates a cert-manager Certificate (and
    #                   optionally a self-signed Issuer). Requires
    #                   certManager.enabled=true.
    #   existingSecret: the chart mounts a pre-created TLS secret and does
    #                   not create a Certificate or Issuer.
    mode: certManager
    # Shared compatibility override for the webhook TLS secret name.
    # In certManager mode this sets Certificate.spec.secretName; in
    # existingSecret mode this names the pre-created secret to mount.
    # The mode-specific values below take precedence when set.
    secretName: ""
    certManager:
      # When true, create a namespaced self-signed Issuer for the webhook
      # Certificate. Set to false to reference an existing Issuer or
      # ClusterIssuer via issuerRef instead.
      createIssuer: true
      issuerRef:
        name: selfsigned-issuer
        kind: Issuer
        group: cert-manager.io
      # Override the Certificate's secretName. When empty, defaults to
      # <chart-name>-webhook-server-cert.
      secretName: ""
    existingSecret:
      # Name of the pre-created TLS secret to mount. Required when the
      # resolved mode is existingSecret unless webhook.tls.secretName is set.
      name: ""

additionalEnvs: []
  # - name: MY_ENV
  #   value: my_value
  # - name: MY_ENV2
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
