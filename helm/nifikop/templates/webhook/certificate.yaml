# The following manifests contain a self-signed Issuer CR and a Certificate CR.
# More documentation can be found at https://docs.cert-manager.io
# WARNING: Targets CertManager v1.0. Check https://cert-manager.io/docs/installation/upgrading/ for breaking changes.
{{- $webhook := .Values.webhook | default dict -}}
{{- $tls := $webhook.tls | default dict -}}
{{- $mode := include "webhook.tls.mode" . -}}
{{- $tlsCertManager := $tls.certManager | default dict -}}
{{- $issuerRef := $tlsCertManager.issuerRef | default dict -}}
{{- $issuerName := default "selfsigned-issuer" $issuerRef.name -}}
{{- $issuerKind := default "Issuer" $issuerRef.kind -}}
{{- $issuerGroup := default "cert-manager.io" $issuerRef.group -}}
{{- if and $webhook.enabled (eq $mode "certManager") }}
{{- if $tlsCertManager.createIssuer }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $issuerName }}
  namespace: {{ $.Release.Namespace }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ template "webhook.certificate.name" . }}
  namespace: {{ $.Release.Namespace }}
spec:
  dnsNames:
    - {{ template "webhook.service.name" . }}.{{ $.Release.Namespace }}.svc
    - {{ template "webhook.service.name" . }}.{{ $.Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ $issuerKind }}
    name: {{ $issuerName }}
{{- if ne $issuerGroup "cert-manager.io" }}
    group: {{ $issuerGroup }}
{{- end }}
  secretName: {{ template "webhook.tls.secret.name" . }}
{{- end }}
